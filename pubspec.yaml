name: memomemo
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: ^6.1.0
  cupertino_icons: ^1.0.8
  firebase_analytics: ^12.1.0
  firebase_auth: ^6.1.2
  firebase_core: ^4.2.1
  firebase_crashlytics: ^5.0.5
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.4
  go_router: ^17.0.1
  google_fonts: ^6.3.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  skeletonizer: ^2.1.2
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  
dev_dependencies:
  build_runner: ^2.4.8
  flutter_gen: ^5.12.0
  flutter_gen_runner: ^5.12.0
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.3.2
  go_router_builder: ^3.0.0
  json_serializable: ^6.7.1
  pedantic_mono: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_gen:
  output: lib/gen/
  line_length: 80
